                        labels: top5.map(item => item[0]),
                        datasets: [{
                            data: top5.map(item => item[1]),
                            backgroundColor: [
                                'rgba(43, 106, 159, 0.9)', 'rgba(255, 159, 64, 0.9)',
                                'rgba(75, 192, 192, 0.9)', 'rgba(153, 102, 255, 0.9)',
                                'rgba(255, 99, 132, 0.9)',
                            ],
                            borderColor: '#fff',
                            borderWidth: 2
                        }]
                    },
                    // // CORREÇÃO DO PLUGIN DATALABELS
                    plugins: [window.ChartDataLabels],
                    // // FIM
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                            },
                            tooltip: {
                                callbacks: {
                                    label: (c) => `${c.label}: ${formatarMoeda(c.raw)} (${((c.raw / totalTop5) * 100).toFixed(1)}%)`
                                }
                            },
                            datalabels: {
                                formatter: (value, ctx) => {
                                    const total = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1) + '%';
                                    return percentage;
                                },
                                color: '#fff',
                                font: {
                                    weight: 'bold',
                                    size: 12,
                                }
                            }
                        },
                        cutout: '60%'
                    }
                });
            }, [data, formatarMoeda]);
            
            return <canvas ref={canvasRef}></canvas>;
        };

        const MonthlyTrendChart = ({ datasets, formatarMoeda }) => {
            const canvasRef = React.useRef(null);
             React.useEffect(() => {
                if (Chart.getChart(canvasRef.current)) Chart.getChart(canvasRef.current).destroy();
                const ctx = canvasRef.current.getContext('2d');
                const lineColors = ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)', 'rgba(75, 192, 192, 1)'];
                new Chart(ctx, {
                    type: 'line', data: { labels: meses, datasets: datasets.map((ds, index) => ({ ...ds, borderColor: lineColors[index % lineColors.length], backgroundColor: lineColors[index % lineColors.length].replace('1)', '0.2)'), tension: 0.1 })) },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${formatarMoeda(c.raw)}` } } }, scales: { y: { ticks: { callback: (v) => formatarMoeda(v) } } } }
                });
            }, [datasets, formatarMoeda]);
            return <canvas ref={canvasRef}></canvas>;
        };

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
            const [anoFiltro, setAnoFiltro] = React.useState('Todos');
            const [unidadeFiltro, setUnidadeFiltro] = React.useState('Todas');
            
            const formatarMoeda = (valor) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0);

            const anosOrdenados = [...new Set(dadosHistoricos.map(d => d.ano))].sort((a, b) => a - b);
            const anosUnicos = ['Todos', ...anosOrdenados];
            
            const unidadesOrdenadas = [...new Set(dadosHistoricos.map(d => d.unidadeGestora))].sort();
            const unidadesUnicas = ['Todas', ...unidadesOrdenadas];

            const dadosFiltrados = React.useMemo(() => dadosHistoricos.filter(d => (anoFiltro === 'Todos' || d.ano == anoFiltro) && (unidadeFiltro === 'Todas' || d.unidadeGestora === unidadeFiltro)), [anoFiltro, unidadeFiltro]);

            const dadosSazonaisFiltrados = React.useMemo(() => {
                const anosParaMostrar = anoFiltro === 'Todos' ? anosOrdenados : [parseInt(anoFiltro)];
                return anosParaMostrar.map(ano => ({ label: ano.toString(), data: meses.map(mes => dadosFiltrados.filter(d => d.ano === ano && d.mes === mes && d.valor > 0).reduce((sum, item) => sum + item.valor, 0)) }));
            }, [dadosFiltrados, anoFiltro]);
            
            const totaisAnuaisCards = React.useMemo(() => {
                const anosVisiveis = anoFiltro === 'Todos' ? anosOrdenados : [parseInt(anoFiltro)];
                return anosVisiveis.map(ano => {
                    const gastos = dadosFiltrados.filter(d => d.ano === ano && d.valor > 0).reduce((sum, item) => sum + item.valor, 0);
                    const devolucoes = dadosFiltrados.filter(d => d.ano === ano && d.valor < 0).reduce((sum, item) => sum + item.valor, 0);
                    return { ano, gastos, devolucoes, saldo: gastos + devolucoes };
                });
            }, [dadosFiltrados, anoFiltro]);
            
            const analiseRisco = React.useMemo(() => {
                const ugsOrcamento = [...new Set(dadosOrcamento2025.map(d => d.unidadeGestora))];
                return ugsOrcamento.map(ug => {
                    const ugNorm = normalizarNome(ug);
                    const historicoUg = dadosHistoricos.filter(d => normalizarNome(d.unidadeGestora) === ugNorm);
                    const orcamentoInfo = dadosOrcamento2025.find(o => normalizarNome(o.unidadeGestora) === ugNorm);
                    if (!orcamentoInfo) return null; 
                    
                    const orcamento2025 = orcamentoInfo.orcamento;
                    const anosNoHistorico = [...new Set(historicoUg.map(d => d.ano))];
                    const totalGasto = historicoUg.reduce((sum, item) => sum + (item.valor > 0 ? item.valor : 0), 0);
                    const mediaHistorica = anosNoHistorico.length > 0 ? totalGasto / anosNoHistorico.length : 0;
                    
                    let variacaoPercentual = 0;
                    let status;

                    if (mediaHistorica > 0) {
                        variacaoPercentual = ((orcamento2025 - mediaHistorica) / mediaHistorica) * 100;
                        if (variacaoPercentual > 30) {
                            status = { nivel: 'Crítico: Aumento Expressivo', corFundo: 'bg-red-100', corTexto: 'text-red-800', icone: <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" /></svg> };
                        } else if (variacaoPercentual > 0) {
                            status = { nivel: 'Atenção: Aumento de Gasto', corFundo: 'bg-yellow-100', corTexto: 'text-yellow-800', icone: <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg> };
                        } else if (variacaoPercentual >= -30) {
                            status = { nivel: 'Positivo: Economia', corFundo: 'bg-green-100', corTexto: 'text-green-800', icone: <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7l8 8m0 0v-8m0 8h-8" /></svg> };
                        } else {
                            status = { nivel: 'Atenção: Risco de Inexecução', corFundo: 'bg-orange-100', corTexto: 'text-orange-800', icone: <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> };
                        }
                    } else {
                        status = { nivel: 'Não Analisado', corFundo: 'bg-gray-100', corTexto: 'text-gray-600', icone: <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> };
                    }
                    
                    return { ug, mediaHistorica, orcamento2025, variacaoPercentual, status };
                })
                .filter(Boolean)
                .sort((a, b) => b.variacaoPercentual - a.variacaoPercentual);
            }, []);

            const insightSazonalidade = React.useMemo(() => {
                const gastosPositivos = dadosFiltrados.filter(d => d.valor > 0);
                if (gastosPositivos.length === 0) return "Sem dados de gastos para a seleção atual.";
                const pico = gastosPositivos.reduce((max, item) => item.valor > max.valor ? item : max, gastosPositivos[0]);
                return `O pico de gastos na seleção atual ocorreu em ${mesesCompletos[pico.mes]} de ${pico.ano}, com um total de ${formatarMoeda(pico.valor)}.`;
            }, [dadosFiltrados]);
            
            return (
                <div className="min-h-screen bg-gray-100 text-gray-800 flex flex-col">
                    <header className="header-govbr text-white px-4 py-3 sm:px-6 shadow-lg flex items-center justify-between gap-4">
                        <div className="text-left">
                            <h2 className="text-base font-semibold leading-tight">Governo do Estado do RN</h2>
                            <p className="text-xs text-gray-300 leading-tight">Secretaria de Administração</p>
                        </div>
                        <div className="flex-1 text-center">
                            <h1 className="text-xl md:text-2xl font-bold">Painel de Gastos com Passagens Aéreas</h1>
                        </div>
                        <div className="w-48 hidden md:block"></div>
                    </header>
                    
                    <main className="p-4 sm:p-6 lg:p-8 flex-grow">
                         <div className="bg-white p-6 rounded-lg shadow-sm mb-8">
                            <h2 className="text-xl font-semibold text-gray-900 mb-3">Filtros de Análise</h2>
                             <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                                <div>
                                    <label htmlFor="filtro-ano" className="block text-sm font-medium text-gray-700 mb-1">Ano</label>
                                    <select id="filtro-ano" value={anoFiltro} onChange={(e) => setAnoFiltro(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md shadow-sm focus-ring">
                                        {anosUnicos.map(ano => <option key={ano} value={ano}>{ano}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label htmlFor="filtro-unidade" className="block text-sm font-medium text-gray-700 mb-1">Unidade Gestora</label>
                                    <select id="filtro-unidade" value={unidadeFiltro} onChange={(e) => setUnidadeFiltro(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md shadow-sm focus-ring">
                                        {unidadesUnicas.map(ug => <option key={ug} value={ug}>{ug}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                           {totaisAnuaisCards.map((item) => (
                               <div key={item.ano} className="p-4 rounded-lg shadow-lg bg-white border-t-4 border-blue-800">
                                   <h3 className="font-bold text-lg text-gray-800">Resumo de {item.ano}</h3>
                                   <div className="mt-2 space-y-2">
                                        <p className="text-sm font-semibold text-green-600">Gastos: {formatarMoeda(item.gastos)}</p>
                                        <p className="text-sm font-semibold text-red-600">Devoluções: {formatarMoeda(item.devolucoes)}</p>
                                        <p className="text-lg font-bold text-blue-800 border-t pt-2 mt-2">Saldo Líquido: {formatarMoeda(item.saldo)}</p>
                                   </div>
                               </div>
                           ))}
                        </div>

                        <div className="bg-white p-6 rounded-lg shadow-sm mb-8">
                            <h3 className="text-xl font-semibold text-gray-900 mb-2 text-center">Sazonalidade de Gastos (2022-2024)</h3>
                            <div className="bg-gray-50 p-3 rounded-md text-sm text-gray-600 mb-2 border border-gray-200">
                                <p className="font-semibold mb-1">Quando os gastos acontecem?</p>
                                <p>Este gráfico compara os gastos mês a mês. Ele é útil para identificar se existem períodos de alta ou baixa nos custos com passagens e interage com os filtros acima.</p>
                            </div>
                            <div className="bg-blue-50 p-3 rounded-md text-sm text-blue-800 mb-4 border border-blue-200">
                                 <p className="font-semibold">Insight:</p>
                                 <p>{insightSazonalidade}</p>
                            </div>
                            <div className="chart-container">
                                <MonthlyTrendChart datasets={dadosSazonaisFiltrados} formatarMoeda={formatarMoeda} />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8 mb-8">
                            <div className="bg-white p-4 rounded-lg shadow-sm">
                                <h3 className="text-lg font-semibold text-gray-900 mb-4 text-center">Tendência Anual de Gastos</h3>
                                <div className="chart-container">
                                    <ColumnChart data={dadosFiltrados} formatarMoeda={formatarMoeda} />
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-lg shadow-sm">
                                <h3 className="text-lg font-semibold text-gray-900 mb-4 text-center">Top 5 Programas com Maiores Gastos</h3>
                                <div className="chart-container">
                                    <Top5ProgramasDoughnutChart data={dadosFiltrados} formatarMoeda={formatarMoeda} />
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-lg shadow-sm">
                                <h3 className="text-lg font-semibold text-gray-900 mb-4 text-center">Top 5 UGs com Maiores Gastos</h3>
                                <div className="chart-container">
                                    <Top5UGsBarChart data={dadosFiltrados} formatarMoeda={formatarMoeda} />
                                </div>
                            </div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-lg shadow-sm">
                           <h2 className="text-xl font-semibold text-gray-900 mb-2">Análise de Variação Orçamentária para 2025</h2>
                           <div className="bg-gray-50 p-3 rounded-md text-sm text-gray-700 mb-4 border border-gray-200">
                             <p className="font-semibold mb-1">Metodologia (Resumo Técnico):</p>
                             <p>Esta análise calcula a variação percentual do orçamento de 2025 em relação ao gasto médio histórico (2022-2024). A coluna "Variação (%)" mostra se o orçamento aumentou (positivo) ou diminuiu (negativo). O "Status Orçamentário" contextualiza o que cada cenário representa.</p>
                           </div>
                           <div className="bg-blue-50 p-3 rounded-md text-sm text-blue-800 mb-4 border border-blue-200">
                             <p className="font-semibold mb-1">Interpretação do Status Orçamentário:</p>
                              <ul className="list-disc list-inside space-y-1">
                                <li><strong>Crítico: Aumento Expressivo:</strong> Orçamento muito maior que a média. Exige análise para justificar o aumento e evitar gastos desnecessários.</li>
                                <li><strong>Atenção: Aumento de Gasto:</strong> Orçamento maior que a média. É preciso acompanhar para entender o motivo do aumento.</li>
                                <li><strong>Positivo: Economia:</strong> Orçamento menor que a média. Sinaliza uma economia planejada e eficiente.</li>
                                <li><strong>Atenção: Risco de Inexecução:</strong> Orçamento muito menor que a média. Alerta para a possibilidade de não haver recursos suficientes para executar as atividades planejadas.</li>
                              </ul>
                           </div>
                           <RiskTable data={analiseRisco} formatarMoeda={formatarMoeda} />
                        </div>
                    </main>

                    <footer className="bg-gray-800 text-gray-300 p-6 mt-auto">
                        <div className="container mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
                            <div>
                                <h3 className="font-bold text-white mb-2 uppercase tracking-wide">Fontes de Dados</h3>
                                <ul className="list-disc list-inside space-y-1">
                                    <li>Gastos Históricos: "Despesas com passagens areas-2022-2023-2024.csv".</li>
                                    <li>Previsão Orçamentária: "Execução Orçamentária - Exterior.pdf" (2025).</li>
                                </ul>
                            </div>
                             <div>
                                <h3 className="font-bold text-white mb-2 uppercase tracking-wide">Metodologia Geral da Análise</h3>
                                <p>
                                    Este painel foi construído a partir da coleta e cruzamento de dados de diferentes fontes oficiais. Primeiramente, os gastos históricos foram extraídos e organizados. Em seguida, foram comparados com as previsões orçamentárias para o ano seguinte. Por fim, os resultados foram transformados nos gráficos e tabelas que você vê, permitindo uma análise visual clara das tendências e dos riscos.
                                </p>
                            </div>
                             <div>
                                <h3 className="font-bold text-white mb-2 uppercase tracking-wide">Realização</h3>
                                <p className="font-semibold">Secretaria de Administração do RN (SEAD)</p>
                                <p>Setor de Compras Governamentais (COMPR)</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
